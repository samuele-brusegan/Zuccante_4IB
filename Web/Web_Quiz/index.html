<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Trivia</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="style.css">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
        <script src="script.js"></script>
    </head>
    <body>
        <div id="loader" class="loader-container" style="position: absolute; top: 0; left: 0; height: 100vh; width: 100vw; transform: translate(-50%, -50%); display: none;">
            <div style="display: flex; justify-content: center; align-items: center; flex-direction: column;">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-2">Caricamento domande in corso...</p>
            </div>
        </div>
        <div class="container">
            <div id="config-container" class="mb-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Configurazione Quiz</h5>
                    </div>
                    <div class="card-body">
                        <form id="quiz-config-form">
                            <div class="row g-3">
                                <div class="col-md-3">
                                    <label for="category-select" class="form-label">Categoria</label>
                                    <select class="form-select" id="category-select">
                                        <option value="">Tutte le categorie</option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <label for="difficulty-select" class="form-label">Difficoltà</label>
                                    <select class="form-select" id="difficulty-select">
                                        <option value="">Qualsiasi</option>
                                        <option value="easy">Facile</option>
                                        <option value="medium">Media</option>
                                        <option value="hard">Difficile</option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <label for="type-select" class="form-label">Tipo</label>
                                    <select class="form-select" id="type-select">
                                        <option value="">Qualsiasi</option>
                                        <option value="multiple">Scelta multipla</option>
                                        <option value="boolean">Vero/Falso</option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <label for="amount-input" class="form-label">Numero di domande</label>
                                    <input type="number" class="form-control" id="amount-input" min="1" max="50" value="10">
                                </div>
                            </div>
                            <div class="mt-3">
                                <button type="submit" class="btn btn-primary">Carica Domande</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div id="questions-container">
                <!-- Le domande verranno inserite qui dinamicamente -->
            </div>
        </div>
    </body>
</html>
